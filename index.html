<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資產查詢系統</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="./script.js" defer></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1 class="title">資產查詢系統</h1>
      <p class="subtitle">請掃描資產上的 QR Code 進行查詢</p>

      <div id="scanSection" class="section">
        <button id="startScanBtn" class="primary-btn">開始掃描 QR Code</button>
        <div id="reader" class="reader hidden"></div>
        <div id="status" class="status"></div>
      </div>

      <div id="resultSection" class="section hidden">
        <div id="result"></div>
      </div>
    </section>
  </main>
</body>
</html>
